logoutput: stderr

internal: 0.0.0.0 port = 55555
external: eth0

socksmethod: username
user.privileged: root
user.unprivileged: sockd

client pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    log: connect error

    # Global ceiling — total simultaneous unauthenticated sessions
    session.max: 200
    session.throttle: 30/1

    # Per-IP limits applied at the connection layer, BEFORE auth
    # session.state.key: from
    # session.state.max: 20
    # session.state.throttle: 5/10

    # Limits apply only until SOCKS negotiation completes.
    # Authenticated users hit no per-rule limits in socks-rules below.
    session.inheritable: no

}

# Prevent SSRF / internal-network egress via the proxy
socks block { from: 0.0.0.0/0 to: 10.0.0.0/8       log: connect error }
socks block { from: 0.0.0.0/0 to: 172.16.0.0/12    log: connect error }
socks block { from: 0.0.0.0/0 to: 192.168.0.0/16   log: connect error }
socks block { from: 0.0.0.0/0 to: 169.254.0.0/16   log: connect error }
socks block { from: 0.0.0.0/0 to: 127.0.0.0/8      log: connect error }

socks pass {
    from: 0.0.0.0/0 to: 0.0.0.0/0
    command: connect
    log: connect error
}
